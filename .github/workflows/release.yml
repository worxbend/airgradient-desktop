name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and publish release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-4-dev libadwaita-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist/usr/bin dist/usr/share/applications dist/usr/share/icons/hicolor/256x256/apps
          cp target/release/airgradient-desktop dist/usr/bin/
          cp assets/airgradient-desktop.svg dist/usr/share/icons/hicolor/256x256/apps/airgradient-desktop.svg
          cp assets/com.airgradient.desktop dist/usr/share/applications/com.airgradient.desktop
          tar -czf airgradient-desktop-linux-x86_64.tar.gz -C dist .

      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: airgradient-desktop-linux-x86_64
          path: airgradient-desktop-linux-x86_64.tar.gz

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: airgradient-desktop-linux-x86_64.tar.gz
          generate_release_notes: true
