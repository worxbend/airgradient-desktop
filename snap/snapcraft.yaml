name: airgradient-desktop
title: Air Monitor
summary: Monitor an AirGradient local-server device
description: |
  Air Monitor is a GTK 4 and libadwaita desktop dashboard for an AirGradient
  device that exposes the local-server endpoint at /measures/current.

base: core24
adopt-info: airgradient-desktop
grade: stable
confinement: strict
compression: lzo
license: MIT
icon: usr/share/icons/hicolor/256x256/apps/com.airgradient.desktop.png
source-code:
  - https://github.com/oleksandr-balyshyn/airgradient-desktop
issues:
  - https://github.com/oleksandr-balyshyn/airgradient-desktop/issues
website:
  - https://github.com/oleksandr-balyshyn/airgradient-desktop

platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

apps:
  airgradient-desktop:
    command: bin/airgradient-desktop
    extensions: [gnome]
    desktop: usr/share/applications/com.airgradient.desktop.desktop
    common-id: com.airgradient.desktop
    plugs:
      - network
      - unity7
    slots:
      - airgradient-desktop

slots:
  airgradient-desktop:
    interface: dbus
    bus: session
    name: com.airgradient.desktop

parts:
  airgradient-desktop:
    plugin: rust
    source: .
    build-packages:
      - libadwaita-1-dev
      - libglib2.0-bin
      - libglib2.0-dev
      - libgtk-4-dev
      - pkg-config
    override-pull: |
      craftctl default
      version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
      if [ -z "${version}" ]; then
        echo "failed to read package version from Cargo.toml" >&2
        exit 1
      fi
      craftctl set version="${version}"
    override-build: |
      craftctl default
      install -Dm644 assets/com.airgradient.desktop.desktop \
        "${CRAFT_PART_INSTALL}/usr/share/applications/com.airgradient.desktop.desktop"
      install -Dm644 assets/com.airgradient.desktop.metainfo.xml \
        "${CRAFT_PART_INSTALL}/usr/share/metainfo/com.airgradient.desktop.metainfo.xml"
      install -Dm644 assets/airgradient-desktop.svg \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/scalable/apps/com.airgradient.desktop.svg"
      install -Dm644 assets/airgradient-desktop.svg \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/scalable/apps/airgradient-desktop.svg"
      install -Dm644 assets/airgradient-desktop.png \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/256x256/apps/com.airgradient.desktop.png"
      install -Dm644 assets/airgradient-desktop.png \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/256x256/apps/airgradient-desktop.png"
      install -Dm644 assets/airgradient-tray.png \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/256x256/status/airgradient-tray.png"
      install -Dm644 assets/airgradient-tray.png \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/256x256/status/airgradient-desktop.png"
      install -Dm644 assets/airgradient-tray.png \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/256x256/status/com.airgradient.desktop.png"
